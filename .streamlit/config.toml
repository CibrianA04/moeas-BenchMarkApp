# ============================================================================
#  Tema de la app (colores y tipografia).  Streamlit lo lee de ESTE archivo:
#      .streamlit/config.toml   (en la raiz del proyecto)
#
#  IMPORTANTE: los cambios aqui solo se aplican al REINICIAR la app
#  (Ctrl+C y volver a lanzar).  Para probar colores en vivo sin reiniciar,
#  usa el menu  ⋮ (arriba a la derecha) -> Settings -> "Edit active theme".
# ============================================================================

[theme]
# "light" (claro) o "dark" (oscuro). Es la base sobre la que se aplican tus colores.
base = "dark"

# Color de acento: botones, sliders, enlaces, foco de widgets, etc.
primaryColor = "#2E7D57"

# Fondo principal (el area central de la app).
backgroundColor = "#0E1117"

# Fondo secundario (barra lateral, cajas, inputs).
secondaryBackgroundColor = "#1C1F26"

# Color del texto.
textColor = "#FAFAFA"

# Tipografia: "sans serif", "serif" o "monospace".
font = "sans serif"
